<!DOCTYPE html>
<html>
<head>
    <title>Advanced Unit Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0f172a; color: white; padding: 40px; text-align: center; }
        .calc-card { 
            background: rgba(255,255,255,0.05); 
            padding: 30px; 
            border-radius: 20px; 
            max-width: 450px; 
            margin: auto; 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 0.9rem; opacity: 0.8; margin-bottom: 5px; display: block; }
        input { 
            width: 100%; 
            padding: 12px; 
            box-sizing: border-box;
            border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.2); 
            background: rgba(0,0,0,0.2);
            color: white;
            font-size: 1rem;
        }
        button { 
            background: linear-gradient(135deg, #3b82f6, #2563eb); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 12px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: 600; 
            margin-top: 10px;
            transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4); }
        #result-box { 
            margin-top: 25px; 
            padding: 20px; 
            background: rgba(96, 165, 250, 0.1); 
            border-radius: 15px;
            display: none; /* Initially hidden */
        }
        #result-value { font-size: 28px; color: #60a5fa; font-weight: bold; }
    </style>
</head>
<body>

<div class="calc-card">
    <h2 style="margin-top: 0;">🧪 Precision Unit Calculator</h2>
    <p style="font-size: 0.8rem; margin-bottom: 25px; opacity: 0.7;">Calculate units based on exact volume and strength.</p>
    
    <div class="input-group">
        <label>Size of one drink (ml):</label>
        <input type="number" id="ml" placeholder="e.g. 30, 330, 650" min="1">
    </div>

    <div class="input-group">
        <label>Alcohol Strength (ABV %):</label>
        <input type="number" id="abv" placeholder="e.g. 42.8 for Whiskey, 5 for Beer" step="0.1">
    </div>

    <div class="input-group">
        <label>How many such drinks per week?</label>
        <input type="number" id="qty" placeholder="e.g. 2" min="1">
    </div>
    
    <button onclick="calculateUnits()">Calculate Total Units</button>

    <div id="result-box">
        <div id="result-value">0 Units</div>
        <p style="margin: 5px 0 0; font-size: 0.8rem; opacity: 0.8;">Weekly Total</p>
    </div>
</div>

<!-- Replace ONLY your Back Button code with this -->


<div class="links" style="margin-top:30px; text-align:center;">

<button onclick="goBackPage()"
style="
background:none;
border:none;
color:#3b82f6;
font-weight:500;
font-size:16px;
cursor:pointer;
">
← Back to Previous Page
</button>

</div>

<script>
function goBackPage(){

    if(window.history.length > 1){
        window.history.back();
    }else{
        window.location.href = "/";
    }

}
</script>




<script>
function calculateUnits() {
    let ml = parseFloat(document.getElementById('ml').value);
    let abv = parseFloat(document.getElementById('abv').value);
    let qty = parseFloat(document.getElementById('qty').value);

    if(ml && abv && qty) {
        // Formula: (Volume * ABV) / 1000 = Units for one drink
        let totalUnits = (ml * abv * qty) / 1000;
        
        document.getElementById('result-box').style.display = 'block';
        document.getElementById('result-value').innerText = totalUnits.toFixed(2) + " Units";
    } else {
        alert("Please fill all fields correctly.");
    }
}
</script>

</body>
</html>
