<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroScan - SVKM IOT Emergency Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #0f172a; color: white; margin: 0; padding: 15px;
            height: 100vh; display: flex; flex-direction: column;
        }
        .header {
            text-align: center; background: rgba(30, 41, 59, 0.7);
            padding: 15px; border-radius: 15px; border: 1px solid #334155;
            margin-bottom: 15px; backdrop-filter: blur(10px);
        }
        h2 { margin: 0; color: #60a5fa; font-size: 22px; }

        /* Search Section */
        .search-container {
            display: flex; justify-content: center; gap: 10px; margin-bottom: 15px;
        }
        input {
            padding: 10px 15px; border-radius: 8px; border: 1px solid #334155;
            background: #1e293b; color: white; width: 300px; outline: none;
        }
        button {
            padding: 10px 20px; border-radius: 8px; border: none;
            background: #3b82f6; color: white; cursor: pointer; font-weight: 600;
        }
        button:hover { background: #2563eb; }

        /* Main Layout */
        .main-layout {
            display: flex; gap: 15px; flex: 1; min-height: 0;
        }
        #map { 
            flex: 2; border-radius: 15px; border: 2px solid #334155;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Scrolling List Section */
        .hospital-list-container {
            flex: 1; background: rgba(30, 41, 59, 0.7);
            border-radius: 15px; border: 1px solid #334155;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .list-header {
            padding: 15px; background: #1e293b; border-bottom: 1px solid #334155;
            font-weight: 600; color: #60a5fa;
        }
        #hospital-list {
            overflow-y: auto; padding: 10px; flex: 1;
        }
        .hospital-card {
            background: #0f172a; padding: 12px; border-radius: 10px;
            margin-bottom: 10px; border: 1px solid #334155;
            cursor: pointer; transition: 0.3s;
        }
        .hospital-card:hover { border-color: #3b82f6; background: #1e293b; }
        .hospital-card h4 { margin: 0 0 5px 0; color: #f8fafc; font-size: 14px; }
        .hospital-card p { margin: 0; font-size: 12px; color: #94a3b8; }

        #status-text { font-size: 12px; color: #22c55e; margin-top: 5px; display: block; }
        
        /* Scrollbar Styling */
        #hospital-list::-webkit-scrollbar { width: 6px; }
        #hospital-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🏥 NeuroScan: Emergency Response Hub</h2>
        <span id="status-text">Ready for Emergency Scan...</span>
    </div>

    <div class="search-container">
        <input type="text" id="addressInput" placeholder="Enter Location (e.g. Dhule, Amalner)">
        <button onclick="searchByAddress()">Find Hospitals</button>
    </div>

    <div class="main-layout">
        <!-- Map View -->
        <div id="map"></div>

        <!-- Scrolling List View -->
        <div class="hospital-list-container">
            <div class="list-header">Nearby Medical Centers</div>
            <div id="hospital-list">
                <p style="text-align: center; color: #64748b; margin-top: 20px;">Search a location to see list.</p>
            </div>
        </div>
    </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. Initialize Map at SVKM IOT Dhule
    const initialLat = 20.9320; 
    const initialLon = 74.7848;
    var map = L.map('map').setView([initialLat, initialLon], 15);
    var markers = [];

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // Initial Marker
    L.marker([initialLat, initialLon]).addTo(map).bindPopup("<b>SVKM IOT Dhule</b>").openPopup();

    // 2. Search Function
    function searchByAddress() {
        const query = document.getElementById('addressInput').value;
        if (!query) return alert("Please enter an address");

        document.getElementById('status-text').innerText = `Searching for ${query}...`;

        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`)
            .then(res => res.json())
            .then(data => {
                if (data.length > 0) {
                    const lat = data[0].lat;
                    const lon = data[0].lon;
                    updateMap(lat, lon, query);
                } else {
                    alert("Location not found");
                }
            });
    }

    // 3. Update Map & Markers
    function updateMap(lat, lon, label) {
        // Clear old markers
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        map.setView([lat, lon], 14);
        
        const userMarker = L.marker([lat, lon]).addTo(map)
            .bindPopup(`<b>Target Area:</b> ${label}`).openPopup();
        markers.push(userMarker);

        fetchHospitals(lat, lon);
    }

    // 4. Fetch Hospitals and Update Scrolling List
    function fetchHospitals(lat, lon) {
        const listContainer = document.getElementById('hospital-list');
        listContainer.innerHTML = '<p style="text-align: center; color: #64748b;">Fetching hospitals...</p>';
        
        const url = `https://overpass-api.de/api/interpreter?data=[out:json];(node["amenity"="hospital"](around:5000,${lat},${lon});way["amenity"="hospital"](around:5000,${lat},${lon}););out center;`;

        fetch(url)
        .then(res => res.json())
        .then(data => {
            listContainer.innerHTML = ''; // Clear loading text
            
            if (data.elements.length === 0) {
                listContainer.innerHTML = '<p style="text-align: center; color: #ef4444;">No hospitals found in 5km.</p>';
                return;
            }

            document.getElementById('status-text').innerText = `Scan Complete: Found ${data.elements.length} centers.`;

            data.elements.forEach(h => {
                const hLat = h.lat || h.center.lat;
                const hLon = h.lon || h.center.lon;
                const name = h.tags.name || "Medical Facility";
                const addr = h.tags["addr:street"] || "Emergency Hub";

                // Add to Map
                const hm = L.marker([hLat, hLon], {
                    icon: L.icon({
                        iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
                        iconSize: [30, 30]
                    })
                }).addTo(map).bindPopup(`<b>${name}</b>`);
                markers.push(hm);

                // Add to Scrolling List
                const card = document.createElement('div');
                card.className = 'hospital-card';
                card.innerHTML = `
                    <h4>${name}</h4>
                    <p>📍 ${addr}</p>
                    <p style="font-size:10px; color:#3b82f6; margin-top:5px;">Click to view on map</p>
                `;
                card.onclick = () => {
                    map.setView([hLat, hLon], 16);
                    hm.openPopup();
                };
                listContainer.appendChild(card);
            });
        });
    }

    // Auto-run for SVKM on Load
    fetchHospitals(initialLat, initialLon);
</script>
</body>
</html>
