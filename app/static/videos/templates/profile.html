<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | Medical Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.12);
            --border: rgba(255, 255, 255, 0.2);
            --blue: #3b82f6;
            --red: #ef4444;
            --green: #10b981;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1559757175-5700dde675bc?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-attachment: fixed;
            color: white;
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1000px; margin: auto; padding-top: 20px; }

        /* --- Profile Header --- */
        .header-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .avatar {
            width: 110px; height: 110px;
            border-radius: 50%;
            border: 4px solid var(--blue);
            box-shadow: 0 0 15px var(--blue);
        }

        .user-meta h2 { margin: 0; font-size: 1.8rem; letter-spacing: 1px; }
        .user-meta p { opacity: 0.8; margin: 5px 0 15px 0; font-size: 0.9rem; }

        /* --- Grid Layout --- */
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .section-box {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }

        .section-box h3 {
            margin-top: 0;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--blue);
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        /* --- Input Fields --- */
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            opacity: 0.7;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-size: 0.95rem;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        /* Active Edit Mode Input Style */
        .form-group input:not([readonly]) {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--blue);
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.3);
        }

        /* --- Buttons --- */
        .btn {
            padding: 10px 22px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-edit { background: var(--blue); color: white; }
        .btn-logout { background: rgba(255,255,255,0.1); color: white; margin-left: 10px; }
        
        .btn-save-container {
            grid-column: span 2;
            text-align: center;
            margin-top: 10px;
        }

        .btn-save {
            background: var(--green);
            color: white;
            padding: 15px 50px;
            font-size: 1rem;
            display: none; /* Initially Hidden */
            width: 100%;
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
        }

        .emergency-title { color: var(--red) !important; }

        @media (max-width: 768px) { .settings-grid { grid-template-columns: 1fr; } .btn-save-container { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-card">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="avatar" alt="User">
        <div class="user-meta">
            <h2>{{ name or 'Patient Name' }}</h2>
            <p><i class="fas fa-envelope"></i> {{ email or 'user@example.com' }}</p>
            <button class="btn btn-edit" onclick="startEditing()"><i class="fas fa-pen"></i> Edit Profile</button>
            <button class="btn btn-logout" onclick="location.href='/logout'"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>

    <form action="/update_profile" method="POST">
        <div class="settings-grid">
            
            <div class="section-box">
                <h3><i class="fas fa-user-circle"></i> Personal Information</h3>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" value="{{ name }}" id="field-name" readonly>
                </div>
                <div class="form-group">
                    <label>Contact Number</label>
                    <input type="text" name="phone" id="field-phone" value="{{ phone }}" placeholder="Set phone number" readonly>
                </div>
               
               <div class="form-group">
    <label>Residential Address</label>
    <input type="text" name="address" value="{{ address }}" id="field-address" readonly>
</div>
                
            </div>

            <div class="section-box" style="border-top: 4px solid var(--red);">
                <h3 class="emergency-title"><i class="fas fa-shield-alt"></i> Emergency Alert Config</h3>
                <p style="font-size: 0.7rem; opacity: 0.7; margin-bottom: 20px;">High-risk reports will be sent to these details:</p>
                
                <div class="form-group">
                    <label>Emergency Mobile (SMS)</label>
                    <input type="text" name="emergency_phone" value="{{ emergency_phone }}" id="field-ephone" placeholder="+91..." readonly>
                </div>

                <div class="form-group">
                    <label>Guardian / Doctor Email</label>
                <input type="email" name="emergency_email" id="field-eemail" value="{{ emergency_email }}" placeholder="doctor@example.com" readonly>
                </div>

                <div style="margin-top: 25px; padding: 10px; background: rgba(239, 68, 68, 0.1); border-radius: 8px;">
                    <small style="color: var(--red); font-weight: bold;"><i class="fas fa-info-circle"></i> System Note:</small>
                    <p style="font-size: 0.65rem; margin: 5px 0 0 0;">SMS notifications are active via Twilio API.</p>
                </div>
            </div>

            <div class="btn-save-container">
                <button type="submit" id="save-button" class="btn btn-save">
                    <i class="fas fa-check-circle"></i> Save Profile Changes
                </button>
            </div>
        </div>
    </form>
</div>

<script>
    function startEditing() {
        // Sabhi inputs ko target karein
        const fields = ['field-name', 'field-phone', 'field-address', 'field-ephone', 'field-eemail'];
        
        fields.forEach(id => {
            const el = document.getElementById(id);
            if(el) {
                el.readOnly = false; // Lock hatayein
                el.focus(); // Pehle input par focus karein
            }
        });

        // Save button dikhayein
        document.getElementById('save-button').style.display = "block";

        // User ko batayein ki editing chalu hai
        Swal.fire({
            icon: 'info',
            title: 'Edit Mode On',
            text: 'Ab aap apni details change kar sakte hain.',
            timer: 2000,
            showConfirmButton: false,
            toast: true,
            position: 'top-end'
        });
    }

    // Success check from URL (After Flask redirects back)
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('success')) {
        Swal.fire({
            icon: 'success',
            title: 'Profile Updated!',
            text: 'Aapka sara data database mein save ho gaya hai.',
            confirmButtonColor: '#3b82f6'
        });
    }
</script>

</body>
