<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Brain Stroke Prediction Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- GLOBAL STYLES & MEDICAL COLOR PALETTE --- */
        :root {
            --primary-blue: #2563eb; 
            --hover-blue: #1d4ed8;
            --medical-teal: #14b8a6;
            --bg-light: #f1f5f9; 
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-slate: #64748b;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Poppins', sans-serif;
        }

        body {
    /* ही इमेज Unsplash वरून आहे, जी कधीच फेल होत नाही */
    background: linear-gradient(rgba(10, 20, 40, 0.8), rgba(10, 20, 40, 0.8)), 
                url('https://images.unsplash.com/photo-1559757175-5700dde675bc?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
    overflow: hidden;
}
        /* --- THE LOGIN CARD (GLASSMORPHISM) --- */
        .login-container {
            /* Glassmorphism Effect */
            background: rgba(255, 255, 255, 0.92); 
            backdrop-filter: blur(15px);
            padding: 3rem;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.4s ease;
        }

        .login-container:hover {
            transform: translateY(-10px);
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.6);
        }

        /* --- HEADER SECTION --- */
        .header-graphic {
            background-color: #eff6ff;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1.5rem auto;
            color: var(--primary-blue);
            font-size: 32px;
            border: 2px solid #dbeafe;
            position: relative;
        }

        h2 {
            color: var(--text-dark);
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-slate);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        /* --- FORM GROUPS --- */
        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
            position: relative;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #334155;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--medical-teal);
            font-size: 1.1rem;
        }

        input {
            width: 100%;
            padding: 12px 15px 12px 3.2rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            background-color: rgba(248, 250, 252, 0.8);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus {
            background-color: #ffffff;
            border-color: var(--medical-teal);
            box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.1);
        }

        /* --- LOGIN BUTTON --- */
        .login-button {
            width: 100%;
            padding: 14px;
            background: var(--primary-blue);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-button:hover {
            background: var(--hover-blue);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
            transform: scale(1.02);
        }

        /* --- FOOTER LINK --- */
        .register-link {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-slate);
        }

        .register-link a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        /* Error Message Handling */
        .error-msg {
            background: #fef2f2;
            color: #b91c1c;
            padding: 10px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 0.85rem;
            border: 1px solid #fee2e2;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="header">
        <div class="header-graphic">
            <i class="fas fa-user-shield"></i>
        </div>
        <h2>Welcome Back</h2>
        <p class="subtitle">Enter your credentials to access the prediction portal.</p>
    </div>

    <form method="post">
        <div class="form-group">
            <label>Email Address</label>
            <div class="input-wrapper">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email" placeholder="name@example.com" required>
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="input-wrapper">
                <i class="fas fa-key"></i>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
        </div>

        <button type="submit" class="login-button">Secure Login</button>
    </form>

    <div class="register-link">
        Don’t have an account? <a href="/register">Register here</a>
    </div>

    {% if error %}
    <div class="error-msg">
        <i class="fas fa-circle-exclamation"></i> {{ error }}
    </div>
    {% endif %}
</div>

</body>
</html>
