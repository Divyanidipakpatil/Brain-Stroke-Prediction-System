<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration | Brain Stroke Prediction Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- GLOBAL STYLES & MEDICAL COLOR PALETTE --- */
        :root {
            --primary-blue: #2563eb; 
            --hover-blue: #1d4ed8;
            --medical-teal: #14b8a6; 
            --bg-light: #f1f5f9; 
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-slate: #64748b;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Poppins', sans-serif;
        }

       body {
    /* ही इमेज आधुनिक AI/Medical Brain ची आहे जी लोड व्हायला सोपी आहे */
    background: linear-gradient(rgba(10, 25, 47, 0.8), rgba(10, 25, 47, 0.8)), 
                url('https://images.unsplash.com/photo-1559757175-5700dde675bc?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
    overflow: hidden;
}

        /* --- THE MODERN GLASS CARD --- */
        .register-container {
            /* Glassmorphism Effect */
            background: rgba(255, 255, 255, 0.92); 
            backdrop-filter: blur(15px); /* काचेसारखा धुरकट इफेक्ट */
            padding: 3rem;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .register-container:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.6);
        }

        /* --- HEADER SECTION --- */
        .header-graphic {
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1.5rem auto;
            color: var(--primary-blue);
            font-size: 38px;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.15);
        }

        h2 {
            color: var(--text-dark);
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-slate);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 2.5rem;
        }

        /* --- FORM GROUPS --- */
        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #334155;
            margin-bottom: 8px;
        }

        .form-group i {
            position: absolute;
            left: 1.1rem;
            top: 41px; 
            color: var(--medical-teal); 
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }

        /* --- INPUTS --- */
        input {
            width: 100%;
            padding: 13px 15px 13px 3.2rem;
            border: 1.5px solid #cbd5e1;
            border-radius: 12px;
            background: rgba(248, 250, 252, 0.9);
            font-size: 1rem;
            color: #1e293b;
            outline: none;
            transition: all 0.2s ease-in-out;
        }

        input:focus {
            border-color: var(--medical-teal);
            background: #ffffff;
            box-shadow: 0 0 15px rgba(20, 184, 166, 0.2);
        }

        input:focus + i {
            color: var(--primary-blue);
        }

        /* --- BUTTON --- */
        .register-button {
            width: 100%;
            padding: 14px;
            background: var(--primary-blue);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            letter-spacing: 0.025em;
        }

        .register-button:hover {
            background: var(--hover-blue);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        /* --- FOOTER --- */
        .login-footer {
            margin-top: 2rem;
            font-size: 0.925rem;
            color: var(--text-slate);
        }

        .login-footer a {
            color: var(--medical-teal);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .login-footer a:hover {
            color: var(--primary-blue);
            text-decoration: underline;
        }

        .error-msg {
            background: #fef2f2;
            color: #b91c1c;
            padding: 12px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 0.85rem;
            border: 1px solid #fee2e2;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
    </style>
</head>
<body>

<div class="register-container">
    <div class="header">
       <div class="header">
    
    <div class="header-graphic" style="position: relative; display: flex; justify-content: center; align-items: center;">
        <i class="fas fa-brain" style="font-size: 40px; color: #2563eb;">
            <span style="font-size: 20px; color: #14b8a6; position: absolute; top: 12px; left: 32px;">
                <i class="fas fa-heartbeat"></i>
            </span>
        </i>
    </div>

    <h2>Create Account</h2>
    <p class="subtitle">Join our medical analytics portal for advanced stroke risk assessment.</p>
</div>

    <form method="post">
        <div class="form-group">
            <label>Full Name</label>
            <i class="fas fa-user-circle"></i>
            <input type="text" name="name" placeholder="e.g. Minal" required>
        </div>

        <div class="form-group">
            <label>Professional Email</label>
            <i class="fas fa-envelope-open-text"></i>
            <input type="email" name="email" placeholder="minal2004@gmail.com" required>
        </div>

        <div class="form-group">
            <label>Secure Password</label>
            <i class="fas fa-shield-alt"></i>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="register-button">Initialize Registration</button>
    </form>

    <div class="login-footer">
        Already a member? <a href="/login">Sign In Here</a>
    </div>

    {% if error %}
    <div class="error-msg">
        <i class="fas fa-circle-exclamation"></i> {{ error }}
    </div>
    {% endif %}
</div>

</body>
</html>
